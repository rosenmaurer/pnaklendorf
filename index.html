<!DOCTYPE html>
<html lang="en">
<head>

<title>Pnaklendorf ☄️</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#000;
  --fg:#c9c9c9;
  --muted:#fff;
  --border:1px solid #0e0e0e;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family:"Cormorant Garamond","Times New Roman",serif;
  letter-spacing:.03em;
  line-height:1.7;
}

header {
  text-align:center;
  padding:3.5rem 1rem;
  border-bottom:var(--border);
}

header h1 {
  margin:0;
  font-size:clamp(2.2rem,3vw,3rem);
  font-weight:400;
  letter-spacing:.38em;
  color:#bbb;
  font-family:Papyrus,"Cinzel","Times New Roman",serif;
}

header img.logo {
  display:block;
  margin:1.2rem auto;
  max-width:160px;
}

/* NAV ahora vertical */
nav {
  display:flex;
  flex-direction:column;
  gap:1.2rem;
  padding:1.5rem;
  border-radius:10px;
  background:linear-gradient(
    135deg,
    rgba(48,16,64,0.85),
    rgba(28,8,44,0.85)
  );
  backdrop-filter:blur(6px);
  box-shadow:0 0 20px rgba(64,0,96,0.35);
}

nav a {
  color:#fff;
  text-decoration:none;
  font-size:.95rem;
  letter-spacing:.14em;
  text-align:center;
}

main {
  display:flex;
  justify-content:center;
  padding:4.5rem 1rem;
  gap:2rem;
  max-width:1200px;
  margin:0 auto;
}

main section {
  flex:1;
  min-width:280px;
  text-align:center;
}

/* borde solo para la columna izquierda */
main section:first-child {
  border-right:1px solid #0e0e0e;
  padding-right:2rem;
}

section img {
  width:90%;
  max-width:300px;
  box-shadow:0 0 40px rgba(0,0,0,1);
}

footer {
  text-align:center;
  padding:1.5rem 1rem;
  border-top:var(--border);
  color:#fff;
}
</style>
</head>

<body>

<header>
  <h1>PNAKLENDORF</h1>
  <img src="Pnaklendorf.png" class="logo">
  <p>Welcome to the Land of Pnaklendorf, the Cthulhu Mythos of Ricardo Meyer.</p>
</header>

<main>

  <!-- SECCIÓN IZQUIERDA: NAV vertical -->
  <section>
    <nav>
      <a href="refugiobizarro.html">REFUGIO BIZARRO</a>
      <a href="https://pnaklendorf.com/relatos">TALES</a>
    </nav>
  </section>

  <!-- SECCIÓN DERECHA intacta -->
  <section style="display:flex; flex-direction:column; align-items:center; gap:2.5rem;">
    <a href="https://www.ligotti.net/index.php?members/r-von-pnaklendorf.5048/" target="_blank">
      <img src="nightmare_banner.jpg">
    </a>

    <a href="https://www.drivethrurpg.com/en/browse?author=%22Ricardo%20Meyer%22" target="_blank">
      <img src="drivethrurpg.png">
    </a>
  </section>

</main>

<footer>
  <p>&copy; All Rights Reserved</p>
</footer>

</body>
</html>
